<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>AFL Goal Kick Challenge</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#0d1520;color:#fff;
    font-family:system-ui,-apple-system,sans-serif;
    touch-action:none;overscroll-behavior:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  /* the canvas fills the entire viewport in any orientation; the game world and
     HUD are laid out responsively inside it, so there are never letterbox bars */
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block;background:#0d1520;touch-action:none}
  #back{position:fixed;top:calc(8px + env(safe-area-inset-top));left:calc(8px + env(safe-area-inset-left));
    z-index:20;background:rgba(10,16,26,.72);color:#cfe3f7;text-decoration:none;font-size:13px;font-weight:700;
    padding:8px 13px;border-radius:999px;border:1px solid rgba(255,255,255,.14)}
  #back:active{background:rgba(10,16,26,.92)}
  #setup{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(5,9,15,.78);z-index:10;overflow:auto;padding:20px}
  #panel{background:#121c2b;border:1px solid #2a3a52;border-radius:16px;
    padding:clamp(20px,4vw,28px) clamp(18px,4vw,34px);
    box-shadow:0 12px 60px rgba(0,0,0,.7);text-align:center;max-width:560px;width:100%;
    max-height:100%;overflow:auto;margin:auto}
  #panel h1{margin:0 0 4px;font-size:clamp(21px,5vw,26px);color:#ffdd33}
  #panel .sub{color:#7a8ba0;font-size:13px;margin-bottom:20px;line-height:1.5}
  /* step 1 — how many players */
  .modes{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:6px}
  .modeBtn{background:#0d1520;border:1px solid #24344c;border-radius:14px;padding:22px 18px;
    width:210px;max-width:100%;cursor:pointer;color:#fff;text-align:center;
    transition:border-color .15s,transform .1s}
  .modeBtn:hover{border-color:#ffdd33}
  .modeBtn:active{transform:scale(.97)}
  .modeIcon{font-size:42px;line-height:1;margin-bottom:10px}
  .modeName{font-size:19px;font-weight:800;margin-bottom:6px}
  .modeDesc{font-size:12px;color:#7a8ba0;line-height:1.4}
  /* step 2 — names & difficulty */
  #players{display:flex;gap:18px;justify-content:center;margin-bottom:22px;flex-wrap:wrap}
  .pcard{background:#0d1520;border:1px solid #24344c;border-radius:12px;padding:16px;
    width:220px;max-width:100%}
  .pcard label{display:block;font-size:11px;letter-spacing:1px;color:#7a8ba0;margin-bottom:8px}
  .pcard input{width:100%;background:#1a2537;border:1px solid #2e405c;color:#fff;
    border-radius:8px;padding:9px 10px;font-size:15px;margin-bottom:12px;outline:none}
  .pcard input:focus{border-color:#ffdd33}
  .diffs{display:flex;gap:6px}
  .diffs button{flex:1;background:#1a2537;border:1px solid #2e405c;color:#9fb4cc;border-radius:8px;
    padding:9px 0;font-size:13px;cursor:pointer}
  .diffs button.sel{background:#ffdd33;border-color:#ffdd33;color:#12203a;font-weight:700}
  .setupBtns{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap}
  #backToMode{background:#1a2537;border:1px solid #2e405c;color:#9fb4cc;border-radius:10px;
    padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer}
  #backToMode:hover{border-color:#7a8ba0}
  #start{background:#3ddc68;border:none;color:#082412;font-size:17px;font-weight:800;
    padding:12px 44px;border-radius:10px;cursor:pointer;letter-spacing:.5px}
  #start:hover{filter:brightness(1.1)}
</style>
</head>
<body>
<a id="back" href="../" title="Back to games">&lsaquo; Games</a>
<canvas id="c" width="960" height="600"></canvas>
<div id="setup">
  <div id="panel">
    <h1>AFL Goal Kick Challenge</h1>

    <!-- Step 1: how many players? -->
    <div id="modeStep">
      <div class="sub">How do you want to play?<br>10 set shots &bull; wind &bull; a man on the mark &bull; 3 difficulty levels</div>
      <div class="modes">
        <button class="modeBtn" data-mode="1">
          <div class="modeIcon">🎯</div>
          <div class="modeName">1 Player</div>
          <div class="modeDesc">Solo practice — chase your best score</div>
        </button>
        <button class="modeBtn" data-mode="2">
          <div class="modeIcon">🤼</div>
          <div class="modeName">2 Players</div>
          <div class="modeDesc">Head-to-head, alternating kicks</div>
        </button>
      </div>
    </div>

    <!-- Step 2: names & difficulty -->
    <div id="nameStep" style="display:none">
      <div class="sub" id="nameSub"></div>
      <div id="players">
        <div class="pcard" id="pcard0">
          <label>PLAYER 1</label>
          <input id="name0" maxlength="12" placeholder="Player 1" autocomplete="off">
          <div class="diffs" id="diffs0">
            <button data-d="easy">Easy</button><button data-d="medium" class="sel">Medium</button><button data-d="hard">Hard</button>
          </div>
        </div>
        <div class="pcard" id="pcard1">
          <label>PLAYER 2</label>
          <input id="name1" maxlength="12" placeholder="Player 2" autocomplete="off">
          <div class="diffs" id="diffs1">
            <button data-d="easy">Easy</button><button data-d="medium" class="sel">Medium</button><button data-d="hard">Hard</button>
          </div>
        </div>
      </div>
      <div class="setupBtns">
        <button id="backToMode">&lsaquo; Back</button>
        <button id="start">START</button>
      </div>
    </div>
  </div>
</div>
<script>
'use strict';
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W = 960, H = 600, DPR = 1;                 // live canvas size (CSS px) + pixel ratio
let US = 1, PORTRAIT = false, MARGIN = 10;     // UI scale, orientation, edge margin
let L = {};                                    // responsive HUD layout rectangles
const DEG = Math.PI / 180;
const CAM = { dist: 9, F: 800, eyeH: 2.9, hor: 170 };
const clamp = (v, a, b) => (v < a ? a : v > b ? b : v);
const GRAV = 9.8, MAX_KICK = 68, TOTAL_ROUNDS = 10;
const GOAL_HALF = 3.2, BEHIND_HALF = 9.6;     // metres, AFL post spacing
const SWEEP_MAX = 24 * DEG;
const RED_ZONE = 82;
const RUN_SPD = 100 / 1.15;
// per-player difficulty: meter speeds, run-up sweet zone, kick scatter, wind punishment
const DIFFS = {
  easy:   { label: 'EASY', sweep: 38 * DEG, power: 68,  lo: 62, hi: 88, scatter: 0.55, wind: 0.6  },
  medium: { label: 'MED',  sweep: 55 * DEG, power: 95,  lo: 68, hi: 82, scatter: 1.0,  wind: 1.0  },
  hard:   { label: 'HARD', sweep: 75 * DEG, power: 122, lo: 71, hi: 79, scatter: 1.45, wind: 1.25 }
};
const WIND_ACC = 0.16;                        // m/s^2 of ball drift per m/s of wind

// ---------- projection ----------
function proj(camX, y, camZ) {
  const zc = camZ + CAM.dist;
  if (zc < 0.4) return null;
  const s = CAM.F / zc;
  return { x: W / 2 + camX * s, y: CAM.hor + (CAM.eyeH - y) * s, s };
}

// ---------- game state ----------
let S = null;
const curP = () => S.players[S.turn];
const curD = () => DIFFS[curP().diff];

function newGame(cfg) {
  // schedule: 7 shots inside 50, 3 bombs from outside, shuffled;
  // both players kick each round from the same spot in the same wind
  const dists = [];
  for (let i = 0; i < 7; i++) dists.push(20 + Math.random() * 28);
  for (let i = 0; i < 3; i++) dists.push(50 + Math.random() * 6);
  for (let i = dists.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [dists[i], dists[j]] = [dists[j], dists[i]];
  }
  S = {
    rounds: dists.map(d => ({
      dist: d,
      angle: (Math.random() * 2 - 1) * (d > 49 ? 15 : 28) * DEG,
      windDir: Math.random() * 2 * Math.PI,          // field bearing the wind blows TOWARD
      windSpd: 4 + Math.random() * 26                // km/h
    })),
    players: cfg.map(c => ({ name: c.name, diff: c.diff, goals: 0, behinds: 0 })),
    round: 1, turn: 0,
    phase: 'aim', kick: null,
    resultText: '', resultSub: '', resultColor: '#fff', resultT: 0,
    time: 0
  };
  setupKick();
}

function nextKick() {
  if (S.players.length === 2 && S.turn === 0) {
    S.turn = 1;                                // hand over to player 2, same round/spot/wind
  } else {
    S.turn = 0; S.round++;                     // next round (solo: every kick; 2P: after both kicked)
  }
  if (S.round > TOTAL_ROUNDS) { S.phase = 'gameover'; return; }
  setupKick();
}

function setupKick() {
  const { dist, angle, windDir, windSpd } = S.rounds[S.round - 1];
  const bx = Math.sin(angle) * dist, bz = Math.cos(angle) * dist;
  const inv = 1 / Math.hypot(bx, bz);
  const fx = -bx * inv, fz = -bz * inv;        // camera forward (ball -> goal centre)
  const rx = -fz, rz = fx;                      // camera right
  const markDist = Math.max(4, Math.min(9, dist - 7));
  const ws = windSpd / 3.6;                       // m/s
  S.kick = {
    dist, angle, bx, bz, fx, fz, rx, rz,
    windSpd, wvx: Math.sin(windDir) * ws, wvz: Math.cos(windDir) * ws,
    markDist, dxf: bx + fx * markDist, dzf: bz + fz * markDist, // defender field pos
    aim: 0, aimDir: 1, aimLocked: false,
    power: 0, pDir: 1,
    runT: 0,
    ball: null, trail: [], touched: false, smothered: false, crossed: false,
    flightT: 0, defJump: 0, spin: 0, kickPoseT: -1
  };
  S.phase = 'aim';
}

// field coords -> camera coords (ball is camera origin)
function f2c(px, pz) {
  const k = S.kick, vx = px - k.bx, vz = pz - k.bz;
  return { x: vx * k.rx + vz * k.rz, z: vx * k.fx + vz * k.fz };
}

// ---------- sound ----------
let AC = null;
function ac() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  return AC;
}
function tone(freq, dur, type, vol, slideTo) {
  const a = ac(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, a.currentTime);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, a.currentTime + dur);
  g.gain.setValueAtTime(vol, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime + dur);
}
function roar(big) {
  const a = ac(); if (!a) return;
  const len = a.sampleRate * 1.6, buf = a.createBuffer(1, len, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = a.createBufferSource(); src.buffer = buf;
  const f = a.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = big ? 900 : 500;
  const g = a.createGain();
  g.gain.setValueAtTime(0.001, a.currentTime);
  g.gain.exponentialRampToValueAtTime(big ? 0.45 : 0.15, a.currentTime + 0.15);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 1.6);
  src.connect(f); f.connect(g); g.connect(a.destination); src.start();
}
const sndKick = () => tone(110, 0.12, 'sine', 0.5, 45);
const sndLock = () => tone(660, 0.08, 'square', 0.12);

// ---------- input / phase machine ----------
function advance() {
  ac();
  const k = S.kick;
  if (S.phase === 'aim') {
    k.aimLocked = true; sndLock();
    S.phase = 'power';
  } else if (S.phase === 'power') {
    sndLock();
    S.phase = 'runup'; k.runT = 0;
  } else if (S.phase === 'runup') {
    doKick();
  } else if (S.phase === 'result') {
    if (S.resultT > 0.6) nextKick();
  } else if (S.phase === 'gameover') {
    showSetup();
  }
}
const setupEl = document.getElementById('setup');
const modeStep = document.getElementById('modeStep');
const nameStep = document.getElementById('nameStep');
const nameSub = document.getElementById('nameSub');
const pcard1 = document.getElementById('pcard1');
const startBtn = document.getElementById('start');
const setupVisible = () => setupEl.style.display !== 'none';
let chosenMode = 2;                             // 1 or 2 players

function showSetup() {                          // back to step 1 (mode select)
  setupEl.style.display = 'flex';
  modeStep.style.display = '';
  nameStep.style.display = 'none';
}
function showNameStep(mode) {                   // step 2 (names + difficulty)
  chosenMode = mode;
  modeStep.style.display = 'none';
  nameStep.style.display = '';
  pcard1.style.display = mode === 2 ? '' : 'none';
  nameSub.innerHTML = mode === 2
    ? 'Head-to-head &bull; 10 kicks each &bull; same spots, same wind, alternating kicks'
    : 'Solo &bull; 10 set shots &bull; aim, load the power, then time your run-up';
  startBtn.textContent = mode === 2 ? 'START MATCH' : 'START';
  document.getElementById('name0').focus();
}

for (const b of document.querySelectorAll('.modeBtn')) {
  b.addEventListener('click', () => { ac(); showNameStep(+b.dataset.mode); });
}
document.getElementById('backToMode').addEventListener('click', showSetup);

const diffSel = ['medium', 'medium'];
for (const i of [0, 1]) {
  document.getElementById('diffs' + i).addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    diffSel[i] = b.dataset.d;
    for (const x of e.currentTarget.querySelectorAll('button')) x.classList.toggle('sel', x === b);
  });
}
startBtn.addEventListener('click', () => {
  ac();
  const cfg = [{ name: (document.getElementById('name0').value.trim() || 'Player 1'), diff: diffSel[0] }];
  if (chosenMode === 2) {
    cfg.push({ name: (document.getElementById('name1').value.trim() || 'Player 2'), diff: diffSel[1] });
  }
  newGame(cfg);
  setupEl.style.display = 'none';
});
addEventListener('keydown', e => {
  if (setupVisible()) {
    if (e.key === 'Enter' && nameStep.style.display !== 'none') startBtn.click();
    return;                                   // let space type into the name fields
  }
  if (e.code === 'Space' || e.key === ' ' || e.key === 'Spacebar' || e.keyCode === 32) {
    e.preventDefault(); advance();
  }
});
cv.addEventListener('pointerdown', () => { if (!setupVisible()) advance(); });

// ---------- kicking physics ----------
function doKick() {
  const k = S.kick, d = curD();
  const t = k.runT;
  const mid = (d.lo + d.hi) / 2, qspan = (d.hi - d.lo) / 2 / 0.3;
  const q = Math.max(0, 1 - Math.abs(t - mid) / qspan);       // run-up timing quality 0..1
  const targetDist = k.power / 100 * MAX_KICK;
  const elev = (20 + 19 * q + (Math.random() * 3 - 1.5)) * DEG;
  let v = Math.sqrt(Math.max(3, targetDist) * GRAV / Math.sin(2 * 38 * DEG));
  v *= 0.85 + 0.15 * q;                                       // mistimed kicks lose distance too
  let scatter = 0.5;
  if (k.power > RED_ZONE) scatter += 6 * (k.power - RED_ZONE) / (100 - RED_ZONE); // overcooked
  scatter += (1 - q) * 5;                                     // shanked off the run-up
  scatter *= d.scatter;
  const th = k.aim + (Math.random() * 2 - 1) * scatter * DEG;
  const dirX = k.fx * Math.cos(th) + k.rx * Math.sin(th);
  const dirZ = k.fz * Math.cos(th) + k.rz * Math.sin(th);
  const vh = v * Math.cos(elev);
  k.ball = { x: k.bx, z: k.bz, y: 0.3, vx: vh * dirX, vz: vh * dirZ, vy: v * Math.sin(elev) };
  k.trail = []; k.flightT = 0; k.kickPoseT = 0; k.quality = q;
  S.phase = 'flight';
  sndKick();
}

function setResult(points, text, sub, color) {
  if (points === 6) { curP().goals++; roar(true); tone(523, 0.5, 'triangle', 0.2); }
  else if (points === 1) { curP().behinds++; roar(false); }
  else tone(180, 0.35, 'sawtooth', 0.12, 90);
  S.resultText = text; S.resultSub = sub; S.resultColor = color; S.resultT = 0;
  S.phase = 'result';
}

function stepFlight(dt) {
  const k = S.kick, b = k.ball;
  k.flightT += dt;
  k.spin += dt * 11;
  if (k.kickPoseT >= 0) k.kickPoseT += dt;
  const steps = 3, sdt = dt / steps;
  const wk = WIND_ACC * curD().wind;
  for (let i = 0; i < steps; i++) {
    const pz = b.z, py = b.y;
    b.vy -= GRAV * sdt;
    if (b.y > 0.3) {                       // wind only drifts the airborne ball
      b.vx += k.wvx * wk * sdt;
      b.vz += k.wvz * wk * sdt;
    }
    b.x += b.vx * sdt; b.z += b.vz * sdt; b.y += b.vy * sdt;

    // man on the mark
    if (!k.touched && !k.crossed) {
      const hd = Math.hypot(b.x - k.dxf, b.z - k.dzf);
      if (hd < 1.0 && b.y > 0.4 && b.y < 3.35) {
        k.touched = true;
        if (b.y < 2.2) {           // smothered: ball killed dead
          k.smothered = true;
          b.vx *= 0.12; b.vz *= 0.12; b.vy = Math.min(b.vy, 0.5);
          tone(200, 0.15, 'square', 0.25, 80);
        } else {
          tone(300, 0.1, 'square', 0.15); // fingertips
        }
      }
    }

    // crossing the goal line (field z = 0), from in front
    if (!k.crossed && pz > 0 && b.z <= 0) {
      k.crossed = true;
      const frac = pz / (pz - b.z);
      const cx_ = b.x + (b.x - (b.x - b.vx * sdt)) * 0; // (x already advanced) — interpolate:
      const ix = (b.x - b.vx * sdt) + b.vx * sdt * frac;
      const ax = Math.abs(ix);
      if (ax < GOAL_HALF - 0.15) {
        if (k.touched) setResult(1, 'TOUCHED — BEHIND', k.smothered ? 'Smothered on the mark!' : 'Fingertips off the mark', '#ffd35c');
        else setResult(6, 'GOAL!', k.quality > 0.9 ? 'Straight through the big sticks!' : 'It\'s a major!', '#ffd700');
      } else if (ax < GOAL_HALF + 0.15) {
        setResult(1, 'POSTER!', 'Clunks off the goal post — one point', '#ffd35c');
      } else if (ax < BEHIND_HALF) {
        setResult(1, 'BEHIND', 'Just misses — one point', '#ffd35c');
      } else {
        setResult(0, 'OUT ON THE FULL', 'Way off target — no score', '#ff7b6b');
      }
      return;
    }

    // ground contact
    if (b.y <= 0 && b.vy < 0) {
      b.y = 0;
      const spd = Math.hypot(b.vx, b.vz);
      if (Math.abs(b.vy) < 1.2 || spd < 1) {   // rolling / dead
        b.vy = 0;
        b.vx *= Math.exp(-2.2 * sdt * steps); b.vz *= Math.exp(-2.2 * sdt * steps);
        if (spd < 0.8) {
          if (k.smothered) setResult(0, 'SMOTHERED!', 'The man on the mark kills it dead', '#ff7b6b');
          else setResult(0, 'SHORT', 'Doesn\'t make the distance', '#ff7b6b');
          return;
        }
      } else {
        b.vy = -b.vy * 0.42;
        b.vx *= 0.62; b.vz *= 0.62;
        // odd-shaped ball: random deviation off the bounce
        const a = (Math.random() * 2 - 1) * 6 * DEG, c = Math.cos(a), s2 = Math.sin(a);
        const nvx = b.vx * c - b.vz * s2, nvz = b.vx * s2 + b.vz * c;
        b.vx = nvx; b.vz = nvz;
        tone(90, 0.06, 'sine', 0.15);
      }
    }
  }
  // defender jump anim
  const hd = Math.hypot(b.x - k.dxf, b.z - k.dzf);
  k.defJump += (((hd < 8 && !k.crossed) ? 0.55 : 0) - k.defJump) * Math.min(1, dt * 8);

  k.trail.push({ x: b.x, z: b.z, y: b.y });
  if (k.trail.length > 40) k.trail.shift();
  if (k.flightT > 9) setResult(0, 'NO SCORE', '', '#ff7b6b');
}

// ---------- update ----------
let last = 0;
function update(dt) {
  S.time += dt;
  const k = S.kick;
  if (S.phase === 'aim') {
    k.aim += k.aimDir * curD().sweep * dt;
    if (k.aim > SWEEP_MAX) { k.aim = SWEEP_MAX; k.aimDir = -1; }
    if (k.aim < -SWEEP_MAX) { k.aim = -SWEEP_MAX; k.aimDir = 1; }
  } else if (S.phase === 'power') {
    k.power += k.pDir * curD().power * dt;
    if (k.power > 100) { k.power = 100; k.pDir = -1; }
    if (k.power < 0) { k.power = 0; k.pDir = 1; }
  } else if (S.phase === 'runup') {
    k.runT += RUN_SPD * dt;
    if (k.runT >= 100) { k.runT = 100; doKick(); }  // ran past the ball — auto shank
  } else if (S.phase === 'flight') {
    stepFlight(Math.min(dt, 0.04));
  } else if (S.phase === 'result') {
    S.resultT += dt;
    if (S.resultT > 2.6) nextKick();
  }
}

// ---------- crowd (pre-rendered, rebuilt to the current width) ----------
const crowd = document.createElement('canvas');
crowd.height = 64;
function buildCrowd() {
  crowd.width = Math.max(1, Math.round(W));
  const c = crowd.getContext('2d');
  c.fillStyle = '#232c38'; c.fillRect(0, 0, crowd.width, 64);
  const cols = ['#5a6a80', '#8a4a4a', '#4a6a52', '#7a7a4a', '#9a8a9a', '#3f5a76', '#6d5a7d'];
  const n = Math.round(crowd.width * 3.6);
  for (let i = 0; i < n; i++) {
    c.fillStyle = cols[(Math.random() * cols.length) | 0];
    c.globalAlpha = 0.35 + Math.random() * 0.5;
    const y = Math.random();                     // denser toward bottom
    c.fillRect(Math.random() * crowd.width, 8 + y * y * 54, 2.2, 2.2);
  }
  c.globalAlpha = 1;
}

// ---------- responsive sizing + HUD layout ----------
function layout() {
  PORTRAIT = H > W;
  US = clamp(Math.min(W, H) / 600, 0.72, 1.3);
  MARGIN = Math.round(8 * US) + 2;
  CAM.hor = Math.round(H * (PORTRAIT ? 0.27 : 0.30));
  // focal length fills the height in landscape; in portrait it's capped by width
  // so the goals still fit across a narrow screen (no distortion, no black bars)
  CAM.F = Math.min(H * 1.34, W * (PORTRAIT ? 1.4 : 2.6));

  const windW = Math.round(118 * US), windH = Math.round(44 * US);
  const mmW = Math.round(150 * US), mmH = Math.round(138 * US);
  const boardH = Math.round(44 * US);
  const powerW = Math.round(26 * US);
  const barH = Math.round(26 * US);
  const gap = Math.round(8 * US);
  L = { windW, windH, mmW, mmH, boardH, powerW, barH, gap };

  if (PORTRAIT) {
    // vertical stack: board (row 1), then shot info + wind (row 2); minimap sits
    // just above the bottom control zone; power bar hugs the right edge
    const boardW = Math.min(Math.round(480 * US), W - 2 * MARGIN);
    L.board = { x: (W - boardW) / 2, y: MARGIN, w: boardW, h: boardH };
    const row2 = L.board.y + boardH + gap;
    L.wind = { x: W - windW - MARGIN, y: row2, w: windW, h: windH };
    const shotH = Math.round(24 * US);
    L.shot = { x: MARGIN, y: row2 + (windH - shotH) / 2, w: W - windW - 3 * MARGIN, h: shotH };
    const barZone = Math.round(70 * US);
    L.minimap = { x: MARGIN, y: H - mmH - MARGIN - barZone, w: mmW, h: mmH };
    L.power = { x: W - powerW - MARGIN - Math.round(6 * US), y: L.wind.y + windH + Math.round(16 * US), w: powerW, h: 0 };
    L.power.h = (H - MARGIN - barZone) - L.power.y;
    const barW = Math.min(Math.round(460 * US), W - 2 * (powerW + 2 * MARGIN));
    L.bar = { cx: W / 2, w: barW, h: barH, y: H - barH - MARGIN - Math.round(4 * US) };
    L.result = { cx: W / 2, cy: Math.round(H * 0.36) };
  } else {
    // classic: minimap top-left, board centred, wind top-right, power bar right
    L.minimap = { x: MARGIN, y: MARGIN, w: mmW, h: mmH };
    L.wind = { x: W - windW - MARGIN, y: MARGIN, w: windW, h: windH };
    const halfAvail = Math.min(W / 2 - (L.minimap.x + mmW + gap), (L.wind.x - gap) - W / 2);
    const boardW = clamp(Math.round(halfAvail * 2), Math.round(150 * US), Math.round(500 * US));
    L.board = { x: (W - boardW) / 2, y: MARGIN, w: boardW, h: boardH };
    const shotW = Math.min(Math.round(300 * US), W - 2 * MARGIN);
    L.shot = { x: (W - shotW) / 2, y: L.board.y + boardH + Math.round(6 * US), w: shotW, h: Math.round(24 * US) };
    L.power = { x: W - powerW - MARGIN - Math.round(6 * US), y: Math.round(H * 0.22), w: powerW, h: Math.round(H * 0.6) };
    const barW = Math.min(Math.round(520 * US), Math.round(W * 0.72));
    L.bar = { cx: W / 2, w: barW, h: barH, y: H - barH - MARGIN - Math.round(18 * US) };
    L.result = { cx: W / 2, cy: Math.round(H * 0.42) };
  }
}

function resize() {
  W = Math.max(1, Math.floor(window.innerWidth));
  H = Math.max(1, Math.floor(window.innerHeight));
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  cv.width = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);        // draw in CSS pixels
  layout();
  buildCrowd();
}

// ---------- rendering ----------
function line3(x1, y1, z1, x2, y2, z2, style, width) {
  const a = proj(x1, y1, z1), b = proj(x2, y2, z2);
  if (!a || !b) return;
  ctx.strokeStyle = style; ctx.lineWidth = width;
  ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
}

function drawField() {
  const k = S.kick;
  // sky
  let g = ctx.createLinearGradient(0, 0, 0, CAM.hor);
  g.addColorStop(0, '#6db9ef'); g.addColorStop(1, '#cfeaf9');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, CAM.hor);
  // stand + crowd
  ctx.fillStyle = '#2e3946'; ctx.fillRect(0, CAM.hor - 78, W, 14);
  ctx.drawImage(crowd, 0, CAM.hor - 64);
  // grass
  g = ctx.createLinearGradient(0, CAM.hor, 0, H);
  g.addColorStop(0, '#4d9e57'); g.addColorStop(1, '#2f7d3c');
  ctx.fillStyle = g; ctx.fillRect(0, CAM.hor, W, H - CAM.hor);
  // mow stripes (lines of constant camera depth are horizontal)
  ctx.fillStyle = 'rgba(255,255,255,0.045)';
  for (let i = 0; i < 22; i += 2) {
    const z0 = i * 6 - 6, z1 = z0 + 6;
    const p0 = proj(0, 0, z0), p1 = proj(0, 0, z1);
    if (p0 && p1) ctx.fillRect(0, p1.y, W, p0.y - p1.y);
  }
  ctx.save();
  ctx.beginPath(); ctx.rect(0, CAM.hor, W, H - CAM.hor); ctx.clip();
  // 50m arc
  ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  let started = false;
  for (let a = -85; a <= 85; a += 2.5) {
    const c = f2c(Math.sin(a * DEG) * 50, Math.cos(a * DEG) * 50);
    const p = proj(c.x, 0, c.z);
    if (!p) { started = false; continue; }
    if (!started) { ctx.moveTo(p.x, p.y); started = true; } else ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
  // goal line + goal square
  const gl = (x1, z1, x2, z2, w) => {
    const a = f2c(x1, z1), b = f2c(x2, z2);
    line3(a.x, 0, a.z, b.x, 0, b.z, 'rgba(255,255,255,0.85)', w);
  };
  gl(-BEHIND_HALF, 0, BEHIND_HALF, 0, 3);
  gl(-GOAL_HALF, 0, -GOAL_HALF, 9, 2); gl(GOAL_HALF, 0, GOAL_HALF, 9, 2);
  gl(-GOAL_HALF, 9, GOAL_HALF, 9, 2);
  ctx.restore();
}

function drawPosts() {
  const posts = [
    { x: -BEHIND_HALF, h: 6.5 }, { x: BEHIND_HALF, h: 6.5 },
    { x: -GOAL_HALF, h: 11 }, { x: GOAL_HALF, h: 11 }
  ];
  for (const p of posts) {
    const c = f2c(p.x, 0);
    const base = proj(c.x, 0, c.z), top = proj(c.x, p.h, c.z);
    if (!base || !top) continue;
    const w = Math.max(2.5, base.s * 0.1);
    ctx.strokeStyle = '#f4f2ec'; ctx.lineCap = 'round'; ctx.lineWidth = w;
    ctx.beginPath(); ctx.moveTo(base.x, base.y); ctx.lineTo(top.x, top.y); ctx.stroke();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = w * 0.35;
    ctx.beginPath(); ctx.moveTo(base.x + w * 0.28, base.y); ctx.lineTo(top.x + w * 0.28, top.y); ctx.stroke();
    // pad
    ctx.strokeStyle = '#e8e4da'; ctx.lineWidth = w * 1.7;
    const padTop = proj(c.x, Math.min(2.2, p.h), c.z);
    ctx.beginPath(); ctx.moveTo(base.x, base.y); ctx.lineTo(padTop.x, padTop.y); ctx.stroke();
    ctx.lineCap = 'butt';
    // wind flag on the tall goal posts
    if (p.h > 8) {
      const k = S.kick;
      const wm = Math.hypot(k.wvx, k.wvz) || 0.001;
      const flut = 1 + 0.12 * Math.sin(S.time * 7 + p.x);
      const fl = (0.6 + wm * 0.28) * flut;               // flag length in metres
      const ex = p.x + k.wvx / wm * fl, ez = 0 + k.wvz / wm * fl;
      const ec = f2c(ex, ez);
      const tip = proj(ec.x, p.h - 0.25 - 0.1 * Math.sin(S.time * 9 + p.x), ec.z);
      const low = proj(c.x, p.h - 0.75, c.z);
      if (tip && low) {
        ctx.fillStyle = '#ffdd33';
        ctx.beginPath();
        ctx.moveTo(top.x, top.y); ctx.lineTo(tip.x, tip.y); ctx.lineTo(low.x, low.y);
        ctx.fill();
      }
    }
  }
}

function drawDefender() {
  const k = S.kick;
  const c = f2c(k.dxf, k.dzf);
  const jump = k.defJump;
  const base = proj(c.x, jump, c.z);
  if (!base) return;
  const s = base.s;
  const m = (mx, my) => ({ x: base.x + mx * s, y: base.y - my * s });
  ctx.strokeStyle = k.touched && S.phase === 'flight' ? '#ff5c4a' : '#7a1f2b';
  ctx.fillStyle = ctx.strokeStyle;
  ctx.lineWidth = Math.max(2, s * 0.13); ctx.lineCap = 'round';
  const hip = m(0, 0.95), neck = m(0, 1.55), head = m(0, 1.74);
  // legs
  ctx.beginPath();
  ctx.moveTo(m(-0.16, 0).x, m(-0.16, 0).y); ctx.lineTo(hip.x, hip.y);
  ctx.lineTo(m(0.16, 0).x, m(0.16, 0).y); ctx.stroke();
  // body
  ctx.beginPath(); ctx.moveTo(hip.x, hip.y); ctx.lineTo(neck.x, neck.y); ctx.stroke();
  // arms raised in a V
  ctx.beginPath();
  ctx.moveTo(m(-0.42, 2.28).x, m(-0.42, 2.28).y); ctx.lineTo(neck.x, neck.y);
  ctx.lineTo(m(0.42, 2.28).x, m(0.42, 2.28).y); ctx.stroke();
  // head
  ctx.beginPath(); ctx.arc(head.x, head.y, Math.max(2, s * 0.13), 0, 7); ctx.fill();
  // shadow
  const sh = proj(c.x, 0, c.z);
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(sh.x, sh.y, s * 0.4, s * 0.1, 0, 0, 7); ctx.fill();
  ctx.lineCap = 'butt';
  // label
  if (S.phase !== 'flight' && S.phase !== 'result') {
    ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = `${Math.max(9, s * 0.16)}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText('ON THE MARK', base.x, base.y - 2.55 * s);
  }
}

function drawKicker() {
  const k = S.kick;
  let cx_ = -0.75, cz = -3.4, pose = 'idle';
  if (S.phase === 'runup') {
    const t = k.runT / 100;
    cz = -3.4 + t * 3.2; cx_ = -0.75 + t * 0.6; pose = 'run';
  } else if (S.phase === 'flight' || S.phase === 'result') {
    cz = -0.2; cx_ = -0.15; pose = 'kick';
  }
  const base = proj(cx_, 0, cz);
  if (!base) return;
  const s = base.s;
  const m = (mx, my) => ({ x: base.x + mx * s, y: base.y - my * s });
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(base.x, base.y, s * 0.42, s * 0.1, 0, 0, 7); ctx.fill();
  ctx.strokeStyle = '#1d2f5e'; ctx.fillStyle = '#1d2f5e';
  ctx.lineWidth = Math.max(3, s * 0.15); ctx.lineCap = 'round';
  const hip = m(0, 0.95), neck = m(0, 1.55), head = m(0.05, 1.76);
  let swing = 0;
  if (pose === 'run') swing = Math.sin(k.runT * 0.5) * 0.35;
  let f1 = m(-0.18 + swing, 0), f2 = m(0.18 - swing, 0);
  if (pose === 'kick') {
    const kt = Math.min(1, (k.kickPoseT >= 0 ? k.kickPoseT : 1) * 4);
    f2 = m(0.3 + kt * 0.45, 0.45 + kt * 0.75);   // follow-through leg
    f1 = m(-0.12, 0);
  }
  ctx.beginPath(); ctx.moveTo(f1.x, f1.y); ctx.lineTo(hip.x, hip.y); ctx.lineTo(f2.x, f2.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hip.x, hip.y); ctx.lineTo(neck.x, neck.y); ctx.stroke();
  // arms
  ctx.beginPath();
  if (pose === 'kick') {
    ctx.moveTo(m(-0.5, 1.8).x, m(-0.5, 1.8).y); ctx.lineTo(neck.x, neck.y); ctx.lineTo(m(0.45, 1.1).x, m(0.45, 1.1).y);
  } else {
    ctx.moveTo(m(-0.3, 1.05).x, m(-0.3, 1.05).y); ctx.lineTo(neck.x, neck.y); ctx.lineTo(m(0.32, 1.15).x, m(0.32, 1.15).y);
  }
  ctx.stroke();
  ctx.beginPath(); ctx.arc(head.x, head.y, Math.max(3, s * 0.14), 0, 7); ctx.fill();
  // white shorts hint
  ctx.strokeStyle = '#e9e9e9'; ctx.lineWidth = Math.max(3, s * 0.16);
  ctx.beginPath(); ctx.moveTo(m(0, 0.8).x, m(0, 0.8).y); ctx.lineTo(hip.x, hip.y); ctx.stroke();
  ctx.lineCap = 'butt';
}

function drawArrow() {
  const k = S.kick;
  if (S.phase !== 'aim' && S.phase !== 'power' && S.phase !== 'runup') return;
  const locked = S.phase !== 'aim';
  const L = 8, th = k.aim;
  const pts = [];
  for (let u = 0.06; u <= 1; u += 0.94 / 10) {
    const p = proj(Math.sin(th) * u * L, 0.02, Math.cos(th) * u * L);
    if (p) pts.push(p);
  }
  if (pts.length < 2) return;
  ctx.save();
  ctx.globalAlpha = locked ? 0.55 : 1;
  const pulse = locked ? 0 : Math.sin(S.time * 8) * 1.5;
  ctx.strokeStyle = locked ? '#ffe97a' : '#ffdd33';
  ctx.lineCap = 'round';
  for (let i = 0; i < pts.length - 1; i++) {
    ctx.lineWidth = 11 - i * 0.8 + pulse * 0.3;
    ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[i + 1].x, pts[i + 1].y); ctx.stroke();
  }
  // arrowhead
  const a = pts[pts.length - 2], b = pts[pts.length - 1];
  const ang = Math.atan2(b.y - a.y, b.x - a.x);
  ctx.fillStyle = ctx.strokeStyle;
  ctx.beginPath();
  ctx.moveTo(b.x + Math.cos(ang) * 14, b.y + Math.sin(ang) * 14);
  ctx.lineTo(b.x + Math.cos(ang + 2.5) * 11, b.y + Math.sin(ang + 2.5) * 11);
  ctx.lineTo(b.x + Math.cos(ang - 2.5) * 11, b.y + Math.sin(ang - 2.5) * 11);
  ctx.fill();
  ctx.restore();
  ctx.lineCap = 'butt';
}

function drawBall() {
  const k = S.kick;
  let fx = k.bx, fz = k.bz, fy = 0.25, spin = 0;
  if (k.ball) { fx = k.ball.x; fz = k.ball.z; fy = k.ball.y; spin = k.spin; }
  // trail
  if (S.phase === 'flight' || S.phase === 'result') {
    for (let i = 0; i < k.trail.length; i++) {
      const t = k.trail[i], c = f2c(t.x, t.z), p = proj(c.x, t.y, c.z);
      if (!p) continue;
      ctx.fillStyle = `rgba(255,255,255,${0.08 + 0.25 * i / k.trail.length})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(1, p.s * 0.03), 0, 7); ctx.fill();
    }
  }
  const c = f2c(fx, fz);
  const sh = proj(c.x, 0, c.z);
  if (sh) {
    const fade = Math.max(0.06, 0.3 - fy * 0.012);
    ctx.fillStyle = `rgba(0,0,0,${fade})`;
    ctx.beginPath(); ctx.ellipse(sh.x, sh.y, sh.s * 0.15, sh.s * 0.05, 0, 0, 7); ctx.fill();
  }
  const p = proj(c.x, fy + 0.12, c.z);
  if (!p) return;
  ctx.save();
  ctx.translate(p.x, p.y); ctx.rotate(spin);
  const rx = Math.max(3, p.s * 0.14), ry = Math.max(2, p.s * 0.09);
  ctx.fillStyle = '#a03327';
  ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, 7); ctx.fill();
  ctx.strokeStyle = '#f0ead8'; ctx.lineWidth = Math.max(1, p.s * 0.015);
  ctx.beginPath(); ctx.moveTo(-rx * 0.6, 0); ctx.lineTo(rx * 0.6, 0); ctx.stroke();
  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}

// fit a font so `text` at weight `wt` never exceeds `maxw`; returns the px size used
function fitFont(text, wt, px, maxw) {
  px = Math.round(px);
  ctx.font = `${wt} ${px}px system-ui`;
  const tw = ctx.measureText(text).width;
  if (tw > maxw) { px = Math.max(8, Math.floor(px * maxw / tw)); ctx.font = `${wt} ${px}px system-ui`; }
  return px;
}

function drawHUD() {
  const k = S.kick, d = curD(), s = US;
  const single = S.players.length === 1;

  drawMinimap();
  drawWind();

  // ---- scoreboard (top-centre) ----
  const b = L.board;
  ctx.fillStyle = 'rgba(10,16,26,0.82)';
  roundRect(b.x, b.y, b.w, b.h, 10 * s); ctx.fill();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const bs = Math.min(s, b.w / (single ? 232 : 384));    // shrink text to a narrow board
  const midY = b.y + b.h / 2;
  if (single) {
    const p = S.players[0];
    ctx.fillStyle = '#ffdd33'; ctx.font = `800 ${Math.round(14 * bs)}px system-ui`;
    ctx.fillText(`${p.name.toUpperCase()} · ${DIFFS[p.diff].label}`, b.x + b.w / 2, midY - 9 * bs);
    ctx.fillStyle = '#fff'; ctx.font = `700 ${Math.round(16 * bs)}px system-ui`;
    ctx.fillText(`${p.goals}.${p.behinds} (${p.goals * 6 + p.behinds})`, b.x + b.w / 2, midY + 9 * bs);
  } else {
    for (let i = 0; i < 2; i++) {
      const p = S.players[i], active = i === S.turn && S.phase !== 'gameover';
      const cx_ = b.x + b.w * (i === 0 ? 0.27 : 0.73);
      ctx.fillStyle = active ? '#ffdd33' : '#9fb4cc';
      ctx.font = `${active ? 800 : 600} ${Math.round(13 * bs)}px system-ui`;
      ctx.fillText(`${active ? '▶ ' : ''}${p.name.toUpperCase()} · ${DIFFS[p.diff].label}`, cx_, midY - 9 * bs);
      ctx.fillStyle = '#fff'; ctx.font = `700 ${Math.round(15 * bs)}px system-ui`;
      ctx.fillText(`${p.goals}.${p.behinds} (${p.goals * 6 + p.behinds})`, cx_, midY + 9 * bs);
    }
  }

  // ---- shot info (includes the round count) ----
  const sh = L.shot, outside = k.dist > 50;
  ctx.fillStyle = 'rgba(10,16,26,0.7)';
  roundRect(sh.x, sh.y, sh.w, sh.h, 8 * s); ctx.fill();
  const side = k.angle < -1.5 * DEG ? `${Math.round(Math.abs(k.angle) / DEG)}° left` :
               k.angle > 1.5 * DEG ? `${Math.round(k.angle / DEG)}° right` : 'straight';
  const shotMsg = `R${Math.min(S.round, TOTAL_ROUNDS)}/${TOTAL_ROUNDS} • ${Math.round(k.dist)}m • ${side}${outside ? ' • OUT 50!' : ''}`;
  ctx.fillStyle = outside ? '#ffb347' : '#cfe3f7';
  fitFont(shotMsg, 600, 12.5 * s, sh.w - 12 * s);
  ctx.fillText(shotMsg, sh.x + sh.w / 2, sh.y + sh.h / 2);

  // ---- power bar (right edge) ----
  const pw = L.power, bx = pw.x, by = pw.y, bw = pw.w, bh = pw.h;
  ctx.fillStyle = 'rgba(10,16,26,0.7)'; roundRect(bx - 6 * s, by - 26 * s, bw + 12 * s, bh + 38 * s, 8 * s); ctx.fill();
  ctx.fillStyle = '#9fb4cc'; ctx.font = `600 ${Math.round(11 * s)}px system-ui`;
  ctx.fillText('POWER', bx + bw / 2, by - 14 * s);
  ctx.fillStyle = '#1a2433'; ctx.fillRect(bx, by, bw, bh);
  const ph = k.power / 100 * bh;
  const pg = ctx.createLinearGradient(0, by + bh, 0, by);
  pg.addColorStop(0, '#3ddc68'); pg.addColorStop(0.6, '#ffd23c'); pg.addColorStop(0.85, '#ff8a3c'); pg.addColorStop(1, '#ff4433');
  ctx.fillStyle = pg; ctx.fillRect(bx, by + bh - ph, bw, ph);
  const rz = by + bh - RED_ZONE / 100 * bh;
  ctx.strokeStyle = '#ff5544'; ctx.lineWidth = 2; ctx.strokeRect(bx - 1, by, bw + 2, rz - by);
  ctx.fillStyle = '#ff8a7a'; ctx.font = `600 ${Math.round(9 * s)}px system-ui`;
  ctx.fillText('WILD', bx + bw / 2, rz - 6 * s);
  const needP = Math.min(100, (k.dist + 3) / MAX_KICK * 100);
  const ny = by + bh - needP / 100 * bh;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(bx - 5 * s, ny); ctx.lineTo(bx + bw + 5 * s, ny); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = `600 ${Math.round(10 * s)}px system-ui`;
  ctx.fillText(`${Math.round(k.dist)}m`, bx + bw / 2, ny - 8 * s);
  ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1.5; ctx.strokeRect(bx, by, bw, bh);

  // ---- bottom control zone: run-up bar OR the phase prompt ----
  const bar = L.bar;
  if (S.phase === 'runup') {
    const rw = bar.w, rh = bar.h, rx_ = bar.cx - rw / 2, ry = bar.y;
    ctx.fillStyle = 'rgba(10,16,26,0.82)'; roundRect(rx_ - 10 * s, ry - 26 * s, rw + 20 * s, rh + 36 * s, 10 * s); ctx.fill();
    ctx.fillStyle = '#ffdd33'; ctx.textAlign = 'center';
    const runMsg = PORTRAIT ? 'RUN-UP — SPACE in the green!' : 'RUN-UP — press SPACE in the green zone to strike it clean!';
    fitFont(runMsg, 700, 13 * s, rw + 16 * s);
    ctx.fillText(runMsg, bar.cx, ry - 13 * s);
    ctx.fillStyle = '#1a2433'; ctx.fillRect(rx_, ry, rw, rh);
    ctx.fillStyle = 'rgba(255,80,60,0.45)'; ctx.fillRect(rx_, ry, d.lo / 100 * rw, rh);
    ctx.fillStyle = 'rgba(61,220,104,0.85)'; ctx.fillRect(rx_ + d.lo / 100 * rw, ry, (d.hi - d.lo) / 100 * rw, rh);
    ctx.fillStyle = 'rgba(255,80,60,0.45)'; ctx.fillRect(rx_ + d.hi / 100 * rw, ry, (100 - d.hi) / 100 * rw, rh);
    const cxr = rx_ + k.runT / 100 * rw;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.moveTo(cxr, ry - 2); ctx.lineTo(cxr - 7, ry - 12); ctx.lineTo(cxr + 7, ry - 12); ctx.fill();
    ctx.fillRect(cxr - 1.5, ry, 3, rh);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.strokeRect(rx_, ry, rw, rh);
  } else if (S.phase === 'aim' || S.phase === 'power') {
    const msg = S.phase === 'aim' ? 'SPACE — lock the arrow on the goal' :
      'SPACE — set power (into the red = long but WILD)';
    ctx.textAlign = 'center';
    const fs = fitFont(msg, 700, 15 * s, W - 2 * MARGIN - 24 * s);
    const tw = ctx.measureText(msg).width;
    const pw2 = tw + 24 * s, ph2 = fs + 18, cy = bar.y + bar.h / 2;
    ctx.fillStyle = 'rgba(10,16,26,0.82)';
    roundRect(bar.cx - pw2 / 2, cy - ph2 / 2, pw2, ph2, 10 * s); ctx.fill();
    ctx.fillStyle = '#ffdd33'; ctx.textBaseline = 'middle';
    ctx.fillText(msg, bar.cx, cy);
  }

  // ---- result banner ----
  if (S.phase === 'result') {
    const R = L.result;
    const pop = Math.min(1, S.resultT * 5);
    const sc = 0.6 + 0.4 * (1 - Math.pow(1 - pop, 3));
    const maxw = W - 4 * MARGIN;
    ctx.save();
    ctx.translate(R.cx, R.cy); ctx.scale(sc, sc);
    ctx.globalAlpha = pop; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const nameFs = fitFont(curP().name.toUpperCase(), 800, 22 * s, maxw);
    ctx.lineWidth = 5 * s; ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.strokeText(curP().name.toUpperCase(), 0, -46 * s);
    ctx.fillStyle = '#cfe3f7'; ctx.fillText(curP().name.toUpperCase(), 0, -46 * s);
    const bigFs = fitFont(S.resultText, 900, 60 * s, maxw);
    ctx.lineWidth = 8 * s; ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.strokeText(S.resultText, 0, 0);
    ctx.fillStyle = S.resultColor; ctx.fillText(S.resultText, 0, 0);
    if (S.resultSub) {
      fitFont(S.resultSub, 600, 19 * s, maxw);
      ctx.lineWidth = 5 * s; ctx.strokeStyle = 'rgba(0,0,0,0.55)';
      ctx.strokeText(S.resultSub, 0, 40 * s);
      ctx.fillStyle = '#fff'; ctx.fillText(S.resultSub, 0, 40 * s);
    }
    ctx.restore();
  }

  if (S.phase === 'gameover') drawGameOver();
}

function drawWind() {
  const k = S.kick, r = L.wind, s = US;
  // wind in camera coords: +x = blowing right across screen, +z = tailwind (toward goal)
  const wxc = k.wvx * k.rx + k.wvz * k.rz;
  const wzc = k.wvx * k.fx + k.wvz * k.fz;
  ctx.fillStyle = 'rgba(10,16,26,0.82)';
  roundRect(r.x, r.y, r.w, r.h, 10 * s); ctx.fill();
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  const tx = r.x + r.w * 0.4;
  ctx.fillStyle = '#9fb4cc'; ctx.font = `600 ${Math.round(10 * s)}px system-ui`;
  ctx.fillText('WIND', tx, r.y + r.h * 0.3);
  ctx.fillStyle = k.windSpd > 20 ? '#ff9a6b' : '#fff'; ctx.font = `700 ${Math.round(15 * s)}px system-ui`;
  ctx.fillText(`${Math.round(k.windSpd)} km/h`, tx, r.y + r.h * 0.68);
  // compass arrow (up = toward the goal)
  const cx_ = r.x + r.w * 0.2, cy_ = r.y + r.h / 2, ang = Math.atan2(-wzc, wxc);
  const len = (8 + Math.min(1, k.windSpd / 30) * 6) * s;
  ctx.save();
  ctx.translate(cx_, cy_); ctx.rotate(ang);
  ctx.strokeStyle = '#ffdd33'; ctx.lineWidth = 3 * s; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-len, 0); ctx.lineTo(len - 4 * s, 0); ctx.stroke();
  ctx.fillStyle = '#ffdd33';
  ctx.beginPath(); ctx.moveTo(len, 0); ctx.lineTo(len - 8 * s, -5.5 * s); ctx.lineTo(len - 8 * s, 5.5 * s); ctx.fill();
  ctx.restore();
  ctx.lineCap = 'butt'; ctx.textAlign = 'center';
}

function drawMinimap() {
  const k = S.kick, r = L.minimap, s = US;
  ctx.fillStyle = 'rgba(10,26,16,0.85)';
  roundRect(r.x, r.y, r.w, r.h, 10 * s); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1; roundRect(r.x, r.y, r.w, r.h, 10 * s); ctx.stroke();
  const ox = r.x + r.w / 2, oy = r.y + 18 * s, sc = 1.9 * (r.w / 152);
  const P = (fx, fz) => ({ x: ox + fx * sc, y: oy + fz * sc });
  // 50m arc
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(ox, oy, 50 * sc, 0.12, Math.PI - 0.12); ctx.stroke();
  // goal line + posts
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(P(-BEHIND_HALF, 0).x, oy); ctx.lineTo(P(BEHIND_HALF, 0).x, oy); ctx.stroke();
  ctx.fillStyle = '#ffdd33';
  for (const px of [-GOAL_HALF, GOAL_HALF]) ctx.fillRect(P(px, 0).x - 1.5, oy - 4, 3, 4);
  ctx.fillStyle = '#bbb';
  for (const px of [-BEHIND_HALF, BEHIND_HALF]) ctx.fillRect(P(px, 0).x - 1, oy - 3, 2, 3);
  // defender
  const d = P(k.dxf, k.dzf);
  ctx.fillStyle = '#ff6a5a'; ctx.beginPath(); ctx.arc(d.x, d.y, 2.5, 0, 7); ctx.fill();
  // ball / player
  let bp = P(k.bx, k.bz);
  if (k.ball) bp = P(k.ball.x, k.ball.z);
  ctx.fillStyle = '#ffdd33'; ctx.beginPath(); ctx.arc(bp.x, bp.y, 3.5, 0, 7); ctx.fill();
  ctx.fillStyle = '#9fd4a8'; ctx.font = `600 ${Math.round(10 * s)}px system-ui`; ctx.textAlign = 'center';
  ctx.fillText('FIELD POSITION', ox, r.y + r.h - 8 * s);
}

// one player's name / score / detail block, centred on (cx, cy)
function drawScoreBlock(p, cx, cy, highlight, s) {
  const tot = p.goals * 6 + p.behinds, maxw = (PORTRAIT ? W : W * 0.46) - 4 * MARGIN;
  ctx.fillStyle = highlight ? '#ffdd33' : '#9fb4cc';
  fitFont(`${p.name.toUpperCase()} · ${DIFFS[p.diff].label}`, 800, 24 * s, maxw);
  ctx.fillText(`${p.name.toUpperCase()} · ${DIFFS[p.diff].label}`, cx, cy);
  ctx.fillStyle = '#fff'; fitFont(`${p.goals}.${p.behinds} (${tot})`, 800, 50 * s, maxw);
  ctx.fillText(`${p.goals}.${p.behinds} (${tot})`, cx, cy + 40 * s);
  ctx.fillStyle = '#7a8ba0'; fitFont('x', 600, 15 * s, maxw);
  ctx.fillText(`${p.goals} goal${p.goals === 1 ? '' : 's'}, ${p.behinds} behind${p.behinds === 1 ? '' : 's'}`, cx, cy + 74 * s);
}

function drawGameOver() {
  const s = US, cx = W / 2;
  ctx.fillStyle = 'rgba(6,10,18,0.9)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffdd33'; fitFont('FULL TIME', 900, 46 * s, W - 4 * MARGIN);
  ctx.fillText('FULL TIME', cx, H * 0.14);

  let verdict;
  if (S.players.length === 1) {
    const p = S.players[0];
    drawScoreBlock(p, cx, H * 0.36, true, s);
    ctx.fillStyle = '#7a8ba0'; fitFont('x', 600, 14 * s, W - 4 * MARGIN);
    ctx.fillText(`from ${TOTAL_ROUNDS} set shots`, cx, H * 0.36 + 98 * s);
    if (p.goals >= 8) verdict = 'Elite! A dead-eye set-shot sniper.';
    else if (p.goals >= 6) verdict = 'Great kicking — a reliable spearhead.';
    else if (p.goals >= 4) verdict = 'Solid effort. Keep drilling those set shots.';
    else if (p.goals >= 2) verdict = 'Getting there — back to the training track!';
    else verdict = 'Tough day at the office. Have another crack!';
  } else {
    const [a, b] = S.players;
    const ta = a.goals * 6 + a.behinds, tb = b.goals * 6 + b.behinds;
    const win = (p, t) => t === Math.max(ta, tb) && ta !== tb;
    if (PORTRAIT) {
      drawScoreBlock(a, cx, H * 0.30, win(a, ta), s);
      drawScoreBlock(b, cx, H * 0.52, win(b, tb), s);
    } else {
      const off = Math.min(W * 0.26, 200 * s);
      drawScoreBlock(a, cx - off, H * 0.38, win(a, ta), s);
      drawScoreBlock(b, cx + off, H * 0.38, win(b, tb), s);
      ctx.fillStyle = '#fff'; ctx.font = `800 ${Math.round(30 * s)}px system-ui`;
      ctx.fillText('—', cx, H * 0.38 + 32 * s);
    }
    if (ta === tb) verdict = 'A DRAW! Extra practice for both.';
    else {
      const w = ta > tb ? a : b, margin = Math.abs(ta - tb);
      verdict = margin >= 24 ? `${w.name} wins by ${margin} — a demolition!` :
                margin >= 12 ? `${w.name} wins by ${margin} — comfortable.` :
                `${w.name} wins by ${margin} — what a nail-biter!`;
    }
  }
  ctx.fillStyle = '#3ddc68'; fitFont(verdict, 700, 25 * s, W - 3 * MARGIN);
  ctx.fillText(verdict, cx, H * (PORTRAIT ? 0.72 : 0.66));

  ctx.fillStyle = '#ffdd33'; fitFont('Press SPACE or tap for a new match', 700, 18 * s, W - 3 * MARGIN);
  if (Math.sin(S.time * 4) > -0.3) ctx.fillText('Press SPACE or tap for a new match', cx, H * 0.86);
}

function render() {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);   // keep drawing in CSS pixels at any DPR
  drawField();
  drawPosts();
  drawDefender();
  drawArrow();
  drawBall();
  drawKicker();
  drawHUD();
}

function frame(ts) {
  const dt = Math.min(0.05, (ts - last) / 1000 || 0.016);
  last = ts;
  if (S.phase !== 'gameover') update(dt); else S.time += dt;
  render();
  requestAnimationFrame(frame);
}

// keep the canvas matched to the viewport in any size / orientation
resize();
addEventListener('resize', resize);
addEventListener('orientationchange', resize);
if (window.visualViewport) visualViewport.addEventListener('resize', resize);

newGame([{ name: 'Player 1', diff: 'medium' }, { name: 'Player 2', diff: 'medium' }]);
requestAnimationFrame(frame);

// Game Box uses a single service worker at the site root (../sw.js).
if ('serviceWorker' in navigator) {
  addEventListener('load', () => navigator.serviceWorker.register('../sw.js').catch(() => {}));
}
</script>
</body>
</html>
